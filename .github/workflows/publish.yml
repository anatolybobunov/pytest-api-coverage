name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify publishing branch is main
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "Tag ref: $GITHUB_REF — allowed"
            exit 0
          fi
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Publishing is only allowed from the main branch. Current ref: $GITHUB_REF"
            exit 1
          fi
          echo "Branch is main — allowed"

      - uses: astral-sh/setup-uv@v6

      - name: Get version from pyproject.toml
        id: get-version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches version
        if: github.event_name == 'release'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="${{ steps.get-version.outputs.version }}"
          [ "$TAG_VERSION" = "$FILE_VERSION" ] || (echo "::error::Tag $TAG_VERSION != pyproject.toml $FILE_VERSION" && exit 1)

      - name: Build
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  smoke-test:
    name: Smoke test (Python ${{ matrix.python-version }})
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for TestPyPI propagation
        run: sleep 30

      - name: Install from TestPyPI
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "pytest-api-coverage==${{ needs.build.outputs.version }}"

      - name: Smoke test import
        run: |
          python -c "import pytest_api_coverage; print('Import OK:', pytest_api_coverage.__version__)"

      - name: Smoke test pytest plugin loads
        run: |
          python -c "
          import importlib.metadata
          eps = importlib.metadata.entry_points(group='pytest11')
          names = [ep.name for ep in eps]
          assert 'api_coverage' in names, f'Plugin not registered, found: {names}'
          print('Plugin entry point registered OK')
          "

  publish-pypi:
    name: Publish to PyPI
    needs: smoke-test
    if: github.event_name == 'release' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
